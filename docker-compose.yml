services:
  # 1. PostgreSQL (ฐานข้อมูลระบบหลัก)
  postgresdb:
    image: postgres:15-alpine
    container_name: my_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: enterprise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. pgAdmin (เครื่องมือจัดการ Database)
  pgadmin:
    image: dpage/pgadmin4
    container_name: my_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports:
      - "5050:80"
    depends_on:
      - postgresdb
    restart: unless-stopped

  # 3. PostgreSQL (ฐานข้อมูลสำหรับ SonarQube)
  sonardb:
    image: postgres:15-alpine
    container_name: my_sonar_postgres
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_password123
      POSTGRES_DB: sonar
    volumes:
      - sonar_data:/var/lib/postgresql/data
    restart: unless-stopped

    # 3. Redis
    # redis:
    #   image: redis:7-alpine
    #   container_name: my_redis
    #   ports:
    #     - "6379:6379"

  # 4. SonarQube (เครื่องมือสแกนโค้ด)
  sonarqube:
    image: sonarqube:lts-community
    container_name: my_sonarqube
    depends_on:
      - sonardb
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_password123
      - SONAR_JDBC_URL=jdbc:postgresql://sonardb:5432/sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  # 5. Jenkins (เครื่องมือสำหรับทำ CI/CD)
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: my_jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  postgres_data:
  sonar_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_data: